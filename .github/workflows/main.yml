name: sorobon-frontend

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build application
        run: npm run build -- --configuration production
