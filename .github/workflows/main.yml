name: sorobon-frontend

on:
  push:
    branches:
      - ak
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build application
        run: npm run build -- --configuration production
      - name: Creating docker image
        run: docker run -t sorobon-frontend:${{github.sha}}
      - name: Login to docker registry
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Push image
        run: |
            docker tag sorobon-frontend:${{github.sha}}\
            ${{secrets.DOCKER_USERNAME}}/sorobon-frontend:${{github.sha}}
            docker push ${{secrets.DOCKER_USERNAME}}/sorobon-frontend:${{github.sha}}
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.VM_HOST}}
          username: ${{secrets.VM_USER}}
          key: ${{secrets.VM_SSH_KEY}}
          script: |
            docker pull ${{secrets.DOCKER_USERNAME}}/sorobon-frontend:${{github.sha}}
             docker stop angular-app || true
            docker rm angular-app || true

            docker run -d \
              --name sorobon-frontend \
              -p 80:80 \
              ${{secrets.DOCKER_USERNAME}}/sorobon-frontend:${{ github.sha }}
